# Reusable image-publish workflow (called by release.yml and auto-release.yml).
#
# Builds + pushes the multi-arch (amd64+arm64) middleware + web-ui images to
# GHCR. Two modes via the `version` input:
#   - version == ''  -> edge build: ghcr.io/byte5ai/omadia-*:edge + :sha-<short>
#   - version set     -> release build: :X.Y.Z + :vX.Y.Z + :X.Y + :vX.Y + :latest
#
# Lives as a reusable `workflow_call` so the edge path (release.yml, on push to
# main) and the version path (auto-release.yml, right after it cuts a Release)
# share ONE build definition. The version path is invoked as a direct job, not
# via a `release: published` event — GitHub does not fire event-triggered
# workflows from a GITHUB_TOKEN-created release, so the call must be in-run.

name: publish-images

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to build (empty = the caller ref, e.g. main for edge).'
        required: false
        type: string
        default: ''
      version:
        description: 'Release tag like v0.3.0 (empty = edge build).'
        required: false
        type: string
        default: ''
  # Manual escape hatch: publish images for a tag whose automated publish-images
  # call was skipped or failed (e.g. a downstream job failure in auto-release.yml
  # caused this to be skipped even though the Release itself already exists).
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build, e.g. v0.55.0'
        required: true
        type: string
      version:
        description: 'Release tag like v0.55.0 (empty = edge build)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: middleware
            image: ghcr.io/byte5ai/omadia-middleware
            context: .
            dockerfile: ./Dockerfile
            # Bundle the official Claude CLI into the published middleware image
            # so subscription-CLI agents (#309) work out of the box on a
            # self-host. NOTE: redistributing a proprietary vendor CLI in a
            # public image — see the Dockerfile comment by INSTALL_SUBSCRIPTION_CLIS.
            build_args: |
              INSTALL_SUBSCRIPTION_CLIS=true
          - name: web-ui
            image: ghcr.io/byte5ai/omadia-web-ui
            context: ./web-ui
            dockerfile: ./web-ui/Dockerfile
            build_args: |
              MIDDLEWARE_URL=http://middleware:8080
          # Dev-platform images (epic #470 W1). Both ride THIS workflow so they
          # stay version-locked to the middleware release under ghcr.io/byte5ai.
          # `sha_on_release: true` also stamps an immutable :sha-<gitsha> on the
          # release build so the runner daemon can pin the launch image by digest
          # (middleware/web-ui keep sha on the edge build only — unchanged).
          - name: dev-runner
            image: ghcr.io/byte5ai/omadia-dev-runner
            # Repo-root context: the shim it bundles is a workspace package under
            # middleware/packages/, compiled inside the Dockerfile's build stage.
            context: .
            dockerfile: ./middleware/sidecars/dev-runner/Dockerfile
            sha_on_release: 'true'
          - name: dev-runner-daemon
            image: ghcr.io/byte5ai/omadia-dev-runner-daemon
            # One image, two entrypoints (daemon.mjs / proxy.mjs) — covers both
            # the dev-runner-daemon and dev-egress-proxy compose services.
            # The Dockerfile is created by the w1-daemon-service-api unit; the
            # build step below is guarded so this workflow stays valid until it
            # lands. Align the context here if that unit chooses a wider one.
            context: ./middleware/sidecars/dev-runner-daemon
            dockerfile: ./middleware/sidecars/dev-runner-daemon/Dockerfile
            sha_on_release: 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      # Guard: skip a matrix image whose Dockerfile is not in the tree yet (the
      # dev-runner-daemon Dockerfile ships in a later W1 unit). The job still
      # goes green — nothing is published for that image until its Dockerfile
      # lands, at which point the same run picks it up automatically.
      - name: Resolve build inputs
        id: guard
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=publish-images::Skipping ${{ matrix.name }}: ${{ matrix.dockerfile }} not present yet (added by a later unit)."
          fi
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          # latest=auto tags :latest only when a (non-prerelease) semver tag is
          # produced — i.e. the version path, never the edge path.
          flavor: |
            latest=auto
          tags: |
            type=edge,branch=main,enable=${{ inputs.version == '' }}
            type=sha,prefix=sha-,enable=${{ inputs.version == '' || matrix.sha_on_release == 'true' }}
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern=v{{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
      - uses: docker/build-push-action@v6
        if: steps.guard.outputs.build == 'true'
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
