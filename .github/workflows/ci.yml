# PR + main-branch quality gate.
#
# Runs lint + typecheck + test on both workspaces, plus a schema smoke
# that applies every migration in the repo against a real pgvector
# container. Audit enforces a high-severity ceiling so a CVE-bumping
# dep can't slip in unnoticed.
#
# Naming-independent — no secrets, no GHCR/npm push. Release-flow lives
# in release.yml (currently placeholder; activates once OB-30 Block 2
# locks the npm-scope + repo name).

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a newer push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Middleware: lint + typecheck + node:test against tsx
  # ------------------------------------------------------------------
  middleware:
    name: middleware (lint + typecheck + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: middleware
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: middleware/package-lock.json

      - name: npm ci (middleware + workspaces)
        run: npm ci --include=optional --no-audit --no-fund

      # sharp's native binary is platform-specific. package-lock.json was
      # generated on macOS (darwin-arm64) and has no `node_modules/@img/
      # sharp-linux-x64` entry, so `npm ci` even with --include=optional
      # skips it. Force-install the linux-x64 variant for the CI runner.
      - name: Install sharp linux-x64 native binary
        run: npm install --no-save --no-audit --no-fund --os=linux --cpu=x64 sharp

      - name: Build workspace packages (compiled dist/ for cross-package imports)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (node --test via tsx)
        run: npm run test

      # Smoke scripts (middleware/scripts/smoke-*.ts) live outside this
      # public repo by design — they hit byte5-internal endpoints. The
      # privacy-shield v2 smoke that previously ran here has the same
      # coverage as the in-suite privacyOutputValidator tests.

  # ------------------------------------------------------------------
  # Web-dev: Next.js admin UI — vitest + lint + typecheck
  # ------------------------------------------------------------------
  web-ui:
    name: web-ui (lint + typecheck + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web-ui/package-lock.json

      - name: npm ci
        run: npm ci --include=optional --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test

  # ------------------------------------------------------------------
  # Schema smoke: apply every migration in the repo against pgvector.
  # Catches SQL-only regressions before they hit prod-or-OSS-demo
  # deploys. Domains are listed explicitly in dependency order; files
  # inside a domain are applied in lexical (numbered) order, so newly
  # added migrations are picked up automatically.
  # ------------------------------------------------------------------
  schema:
    name: schema (migrations on pgvector)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: omadia
          POSTGRES_USER: omadia
          POSTGRES_PASSWORD: omadia-ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U omadia -d omadia"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # Schema domains in apply order. Within each domain, files apply
      # in lexical (file-name) order — which matches the numbered
      # migration convention. Newline-separated so the shell loop can
      # iterate cleanly.
      MIGRATION_DOMAINS: |
        middleware/packages/harness-knowledge-graph-neon/src/migrations
        middleware/src/auth/migrations
        middleware/src/plugins/routines/migrations
        middleware/src/profileSnapshots/migrations
        middleware/src/profileStorage/migrations
    steps:
      - uses: actions/checkout@v4

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=omadia-ci psql -h localhost -U omadia -d omadia \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Apply all migrations
        run: |
          set -euo pipefail
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            echo "==> domain: $dir"
            for f in "$dir"/*.sql; do
              echo "  applying $(basename "$f")"
              PGPASSWORD=omadia-ci psql -h localhost -U omadia -d omadia \
                -v ON_ERROR_STOP=1 -f "$f"
            done
          done <<< "$MIGRATION_DOMAINS"

      - name: Re-apply migrations (idempotency check)
        run: |
          set -euo pipefail
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            for f in "$dir"/*.sql; do
              PGPASSWORD=omadia-ci psql -h localhost -U omadia -d omadia \
                -v ON_ERROR_STOP=1 -f "$f" > /dev/null
              echo "✓ idempotent: $(basename "$f")"
            done
          done <<< "$MIGRATION_DOMAINS"

  # ------------------------------------------------------------------
  # Dependency audit. Enforces a "no high or critical" floor — moderate
  # findings remain warnings (some of ours are dev-tools that need a
  # Next.js major to clear). Acts as the canary for new CVE bumps in
  # transitive deps.
  # ------------------------------------------------------------------
  audit:
    name: audit (high+critical block)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        workspace: [middleware, web-ui]
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: npm ci
        run: npm ci --include=optional --no-audit --no-fund

      - name: npm audit (--audit-level=high)
        run: npm audit --audit-level=high
