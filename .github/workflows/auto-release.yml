name: auto-release

# Tag-only automated releases. On each merge to `main`, inspect conventional
# commits since the last tag; if there's a feat/fix, create the next semver
# tag + a GitHub Release with a categorized changelog (Added/Changed/Fixed,
# generated from commit subjects by .github/scripts/generate-changelog.mjs).
#
# HARD RULE: every tagged release gets a clean, categorized changelog with no
# manual step required — enforced by construction, since it's part of the
# same job that creates the tag: there is no code path that tags a release
# without also writing its changelog body.
#
# Deliberately does NOT try to commit that changelog into docs/CHANGELOG.md
# on every release: `main` requires a PR (branch protection, enforce_admins),
# and this org disallows GitHub Actions from creating pull requests (org
# policy, checked via `gh api orgs/byte5ai/actions/permissions/workflow` —
# blocks even a repo-level opt-in). Working around that would mean either a
# PAT-backed bot identity (a standing credential to maintain) or a PR per
# release for someone to merge by hand (exactly the manual step this is
# supposed to remove) — both worse than the problem. `docs/CHANGELOG.md`
# stays a periodically-refreshed mirror: run
# `node .github/scripts/generate-changelog.mjs backfill` locally when you
# want it caught up; GitHub Releases are the automated source of truth.
#
#   fix:                      -> patch  (0.2.0 -> 0.2.1)
#   feat:                     -> minor  (0.2.0 -> 0.3.0)
#   feat!: / BREAKING CHANGE  -> minor while < 1.0 (pre-major)
#   anything else             -> no release
#
# Note: the tag is the version of record. package.json files are not auto-bumped
# (bump them in a normal PR when you want them to match a release).

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.rel.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Compute bump, tag, and release
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then latest="v0.0.0"; range="HEAD"; else range="${latest}..HEAD"; fi
          echo "latest tag: $latest (range: $range)"

          msgs=$(git log --no-merges --pretty=format:'%s%n%b' $range)

          bump=""
          if printf '%s\n' "$msgs" | grep -qE 'BREAKING CHANGE' \
             || printf '%s\n' "$msgs" | grep -qE '^[a-z]+(\(.+\))?!:'; then
            bump="minor"                       # pre-1.0: breaking -> minor
          elif printf '%s\n' "$msgs" | grep -qE '^feat(\(.+\))?:'; then
            bump="minor"
          elif printf '%s\n' "$msgs" | grep -qE '^fix(\(.+\))?:'; then
            bump="patch"
          fi

          if [ -z "$bump" ]; then
            echo "No feat/fix commits since $latest — skipping release."
            exit 0
          fi

          ver="${latest#v}"
          MA="${ver%%.*}"; rest="${ver#*.}"; MI="${rest%%.*}"; PA="${rest#*.}"
          if [ "$bump" = "minor" ]; then MI=$((MI + 1)); PA=0; else PA=$((PA + 1)); fi
          new="v${MA}.${MI}.${PA}"

          if git rev-parse "$new" >/dev/null 2>&1 || gh release view "$new" >/dev/null 2>&1; then
            echo "$new already exists — skipping."
            exit 0
          fi

          echo "Releasing $new (bump=$bump)"
          node .github/scripts/generate-changelog.mjs notes "$latest" HEAD /tmp/release-notes.md

          # Annotated tags need a committer identity; the runner has none.
          # Use the GitHub Actions bot so the tagger is attributable.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$new" -m "omadia $new"
          git push origin "$new"
          gh release create "$new" --notes-file /tmp/release-notes.md --title "omadia $new" --latest
          # Hand the new tag to the publish-images job below. A GITHUB_TOKEN
          # release does not fire a `release` event, so the image build must run
          # here in the same workflow rather than via an event trigger.
          echo "new_tag=$new" >> "$GITHUB_OUTPUT"

  # Build + push the versioned + :latest images for the Release just cut.
  # Runs only when a release happened (new_tag set). In-run call, so it does
  # not depend on the (suppressed) `release` event firing.
  publish-images:
    needs: release
    if: ${{ needs.release.outputs.new_tag != '' }}
    permissions:
      contents: read
      packages: write
      # Keyless cosign signing of the dev-runner release image (spec §10): the
      # reusable workflow signs with the workflow's GitHub OIDC token, so the
      # CALLER must grant id-token here — a reusable workflow cannot self-grant it.
      id-token: write
    uses: ./.github/workflows/publish-images.yml
    with:
      ref: ${{ needs.release.outputs.new_tag }}
      version: ${{ needs.release.outputs.new_tag }}

  # Build + attach the native desktop installers (macOS/Linux signed if secrets
  # are set; Windows best-effort). Same in-run pattern as publish-images, because
  # the GITHUB_TOKEN-created release does not fire a `release` event.
  desktop-apps:
    needs: release
    if: ${{ needs.release.outputs.new_tag != '' }}
    permissions:
      contents: write
    uses: ./.github/workflows/desktop-apps.yml
    with:
      tag: ${{ needs.release.outputs.new_tag }}
    secrets: inherit
