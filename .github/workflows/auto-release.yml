name: auto-release

# Tag-only automated releases. On each merge to `main`, inspect conventional
# commits since the last tag; if there's a feat/fix, create the next semver
# tag + a GitHub Release with a categorized changelog (Added/Changed/Fixed,
# generated from commit subjects by .github/scripts/generate-changelog.mjs),
# then open a docs(changelog) PR that promotes docs/CHANGELOG.md's
# [Unreleased] section into the same dated entry and auto-merges itself.
#
# HARD RULE: every tagged release gets a clean, categorized changelog —
# both as GitHub Release notes and as a docs/CHANGELOG.md entry — with no
# manual step required. See docs/CHANGELOG.md's header for the policy.
#
# Uses only GITHUB_TOKEN (contents: write, pull-requests: write) — no PAT.
# The changelog PR relies on the repo's existing auto-merge setting + zero
# required approving reviews to land unattended once the (path-filter-free)
# required CI checks pass. It ALSO requires the repo setting "Allow GitHub
# Actions to create and approve pull requests" (Settings > Actions > General
# > Workflow permissions) — without it, `gh pr create` fails with "GitHub
# Actions is not permitted to create or approve pull requests" and the
# changelog-pr job fails (harmlessly: it's isolated from publish-images /
# desktop-apps below, see that job's comment).
#
#   fix:                      -> patch  (0.2.0 -> 0.2.1)
#   feat:                     -> minor  (0.2.0 -> 0.3.0)
#   feat!: / BREAKING CHANGE  -> minor while < 1.0 (pre-major)
#   anything else             -> no release
#
# Note: the tag is the version of record. package.json files are not auto-bumped
# (bump them in a normal PR when you want them to match a release).

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.rel.outputs.new_tag }}
      latest_tag: ${{ steps.rel.outputs.latest_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Compute bump, tag, and release
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then latest="v0.0.0"; range="HEAD"; else range="${latest}..HEAD"; fi
          echo "latest tag: $latest (range: $range)"

          msgs=$(git log --no-merges --pretty=format:'%s%n%b' $range)

          bump=""
          if printf '%s\n' "$msgs" | grep -qE 'BREAKING CHANGE' \
             || printf '%s\n' "$msgs" | grep -qE '^[a-z]+(\(.+\))?!:'; then
            bump="minor"                       # pre-1.0: breaking -> minor
          elif printf '%s\n' "$msgs" | grep -qE '^feat(\(.+\))?:'; then
            bump="minor"
          elif printf '%s\n' "$msgs" | grep -qE '^fix(\(.+\))?:'; then
            bump="patch"
          fi

          if [ -z "$bump" ]; then
            echo "No feat/fix commits since $latest — skipping release."
            exit 0
          fi

          ver="${latest#v}"
          MA="${ver%%.*}"; rest="${ver#*.}"; MI="${rest%%.*}"; PA="${rest#*.}"
          if [ "$bump" = "minor" ]; then MI=$((MI + 1)); PA=0; else PA=$((PA + 1)); fi
          new="v${MA}.${MI}.${PA}"

          if git rev-parse "$new" >/dev/null 2>&1 || gh release view "$new" >/dev/null 2>&1; then
            echo "$new already exists — skipping."
            exit 0
          fi

          echo "Releasing $new (bump=$bump)"
          node .github/scripts/generate-changelog.mjs notes "$latest" HEAD /tmp/release-notes.md

          # Annotated tags need a committer identity; the runner has none.
          # Use the GitHub Actions bot so the tagger is attributable.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$new" -m "omadia $new"
          git push origin "$new"
          gh release create "$new" --notes-file /tmp/release-notes.md --title "omadia $new" --latest
          # Hand the new tag to the publish-images job below. A GITHUB_TOKEN
          # release does not fire a `release` event, so the image build must run
          # here in the same workflow rather than via an event trigger.
          echo "new_tag=$new" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest" >> "$GITHUB_OUTPUT"

  # Promotes docs/CHANGELOG.md's [Unreleased] into the dated version section via
  # an auto-merging PR. Deliberately its OWN job (not a step in `release`):
  # a failure here must never cascade into `needs: release` on publish-images /
  # desktop-apps below, since GitHub only runs those if the `release` JOB's
  # overall conclusion is success — a failing step anywhere in that job would
  # silently skip shipping the images/installers for a release that already
  # exists. (This bit us on v0.55.0: the PR-creation step failed and both
  # downstream jobs were skipped even though the tag + GitHub Release were
  # already live.)
  changelog-pr:
    needs: release
    if: ${{ needs.release.outputs.new_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      NEW_TAG: ${{ needs.release.outputs.new_tag }}
      LATEST_TAG: ${{ needs.release.outputs.latest_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Promote docs/CHANGELOG.md via an auto-merging PR
        run: |
          set -euo pipefail

          version="${NEW_TAG#v}"
          date="$(date -u +%F)"
          branch="chore/changelog-${NEW_TAG}"

          node .github/scripts/generate-changelog.mjs cut "$LATEST_TAG" "$NEW_TAG" "$version" "$date" /tmp/cut-notes.md

          if git diff --quiet -- docs/CHANGELOG.md; then
            echo "docs/CHANGELOG.md already has a [$version] section — nothing to PR."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add docs/CHANGELOG.md
          git commit -m "docs(changelog): ${NEW_TAG}"
          git push origin "$branch"
          gh pr create --title "docs(changelog): ${NEW_TAG}" \
            --body "Automated changelog entry for **${NEW_TAG}**, generated by \`.github/scripts/generate-changelog.mjs\` from the conventional-commit messages since ${LATEST_TAG}." \
            --base main --head "$branch"
          gh pr merge "$branch" --squash --auto

  # Build + push the versioned + :latest images for the Release just cut.
  # Runs only when a release happened (new_tag set). In-run call, so it does
  # not depend on the (suppressed) `release` event firing.
  publish-images:
    needs: release
    if: ${{ needs.release.outputs.new_tag != '' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-images.yml
    with:
      ref: ${{ needs.release.outputs.new_tag }}
      version: ${{ needs.release.outputs.new_tag }}

  # Build + attach the native desktop installers (macOS/Linux signed if secrets
  # are set; Windows best-effort). Same in-run pattern as publish-images, because
  # the GITHUB_TOKEN-created release does not fire a `release` event.
  desktop-apps:
    needs: release
    if: ${{ needs.release.outputs.new_tag != '' }}
    permissions:
      contents: write
    uses: ./.github/workflows/desktop-apps.yml
    with:
      tag: ${{ needs.release.outputs.new_tag }}
    secrets: inherit
