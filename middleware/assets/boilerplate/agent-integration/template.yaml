# Builder template manifest
#
# Describes how the CodegenEngine maps an AgentSpec onto the boilerplate layout
# in this directory:
#
#   - slots[]:        marked code regions that receive LLM-generated content
#                     (markers: `// #region builder:<key>` ...
#                     `// #endregion`)
#   - placeholders:   `{{TOKEN}}` -> source path into the AgentSpec (dotted
#                     path, `[i]` indexing allowed; `__derived__/<name>` for
#                     computed values)
#   - skip_files:     files omitted in the output (top-level or as a
#                     path segment)
#
# Templates must carry an `id` matching the directory name — the resolver
# verifies this on load so that registry and filesystem do not drift apart.

id: agent-integration
description: |
  Integration-consuming agent. Pattern: a client.ts wraps an
  external API endpoint (HTTP/SDK), and toolkit.ts exposes tools that
  call this client. Sets `depends_on` to an integration plugin
  (e.g. de.byte5.integration.openweather) for vault scope and
  capability resolution. Reference: middleware/packages/agent-seo-analyst/.

slots:
  - key: client-interface
    target_file: client.ts
    required: false
    description: |
      Optional override of the Client/SearchResult interface declarations.
      Default exports `Client { ping; search; dispose }` + `SearchResult`.
      Replace when the plugin needs custom methods (e.g. listIssues,
      getIssue, postComment) so toolkit code can call them without `as`
      casts. The interface name `Client` must remain because
      `ToolkitOptions { client: Client }` references it across the file.
  - key: client-impl
    target_file: client.ts
    required: true
    description: API client class or SDK wrapper
  - key: toolkit-impl
    target_file: toolkit.ts
    required: true
    description: Tool array with Anthropic tool spec + handler bodies
  - key: activate-body
    target_file: plugin.ts
    required: false
    description: Custom activate code (optional; default leaves the boilerplate body)
  - key: skill-prompt
    target_file: skills/{{AGENT_SLUG}}-expert.md
    required: true
    description: System prompt body (frontmatter is generated automatically)
    # Allow splitting large skill markdowns across up to 4 additional
    # partials (skill-prompt-1 … skill-prompt-4). Each fill_slot call stays
    # under the Anthropic tool-call argument-size limit (~30 KB); the
    # runtime concatenates all partials with `\n\n---\n\n` separators.
    max_partials: 4
  - key: admin-ui-body
    target_file: assets/admin-ui/index.html
    required: false
    description: |
      Optional operator admin UI body content (HTML, inline <style>+<script>
      allowed). Mounted via ctx.routes.register() in the activate-body
      and declared in manifest.yaml as the top-level admin_ui_path. When
      not set: the default placeholder explains to the operator that
      no admin UI is configured.
  - key: toolkit-imports
    target_file: toolkit.ts
    required: false
    description: |
      Auto-managed by codegen — DO NOT fill via fill_slot. Codegen scans
      the toolkit-impl slot content and decides which type names from
      './client.js' are actually referenced (Client is always emitted —
      it appears in ToolkitOptions outside the marker; SearchResult is
      conditional). Prevents noUnusedLocals from breaking slot-fill for
      plugins that replace the default search tool with custom logic.
  - key: plugin-imports
    target_file: plugin.ts
    required: false
    description: |
      Auto-managed by codegen — DO NOT fill via fill_slot. Codegen scans
      the activate-body slot content and decides which value imports
      from './client.js' and './toolkit.js' are actually referenced.
      `type Toolkit` is always emitted because it appears in the
      AgentHandle interface outside any marker. createClient /
      createToolkit are conditional and disappear from the import line
      when a custom activate-body builds the client/toolkit inline.
  - key: plugin-module-imports
    target_file: plugin.ts
    required: false
    description: |
      LLM-authored top-level imports for the activate-body. Use this to
      add `import express from 'express'`, `import path from 'node:path'`,
      `import { fileURLToPath } from 'node:url'` and similar when mounting
      an admin-UI router or doing anything else that needs module-top
      imports beyond the auto-managed ones. Third-party imports must be
      backed by entries in package.json#peerDependencies — express, zod,
      and @omadia/plugin-ui-helpers ship by default.
  - key: external-reads-imports
    target_file: plugin.ts
    required: false
    description: |
      Auto-managed by codegen — DO NOT fill via fill_slot. Codegen splices
      the `import { z } from 'zod'` line plus `import type { … }` lines
      for each unique service in spec.external_reads here.
  - key: external-reads-init
    target_file: plugin.ts
    required: false
    description: |
      Auto-managed by codegen — DO NOT fill via fill_slot. Codegen
      synthesises the body of this region from spec.external_reads[]:
      typed `ctx.services.get(...)` lookups + tool descriptors that get
      pushed onto the toolkit. Empty when spec.external_reads is empty.
      To wire cross-integration data, add entries to spec.external_reads
      via patch_spec, NOT by hand-coding the activate-body slot.
  - key: ui-routes-imports
    target_file: plugin.ts
    required: false
    description: |
      Auto-managed by codegen (B.12) — DO NOT fill via fill_slot. Codegen
      splices Express Router + per-route UiRouter factory imports here
      from spec.ui_routes[]. Empty by default. To add a Dashboard-Tab,
      append a UiRoute to spec.ui_routes via patch_spec.
  - key: ui-routes-init
    target_file: plugin.ts
    required: false
    description: |
      Auto-managed by codegen (B.12) — DO NOT fill via fill_slot. Codegen
      synthesises per-route Express router instantiation,
      `ctx.routes.register(...)` mounts, and `ctx.uiRoutes.register(...)`
      descriptor wiring from spec.ui_routes[]. Each register-return-value
      is pushed onto the `__uiRouteDisposers` array so close() tears
      everything down. Empty by default.

placeholders:
  AGENT_ID: id
  AGENT_NAME: name
  AGENT_SLUG: __derived__/agentSlug
  AGENT_DESCRIPTION_DE: description
  AGENT_AUTHOR: author
  AGENT_VERSION: version
  AGENT_DOMAIN: domain
  CATEGORY: category
  # Removed INTEGRATION_ID (depends_on[0]). Codegen now writes spec.depends_on
  # directly into the manifest YAML AST so self-contained agents (PAT/OAuth
  # in their own setup_fields, no parent integration plugin) work without a
  # placeholder residue error. See `reproduceManifestCapabilities` in
  # codegen.ts for the AST-level depends_on overwrite.
  ROLE_DESCRIPTION_DE: skill.role
  WHEN_TO_USE_DE: playbook.when_to_use
  NOT_FOR_CASE_1: playbook.not_for[0]
  EXAMPLE_PROMPT_1: playbook.example_prompts[0]
  EXAMPLE_PROMPT_2: playbook.example_prompts[1]
  # Removed OUTBOUND_HOST (network.outbound[0]). Codegen now writes
  # spec.network.outbound directly into permissions.network.outbound via the
  # YAML AST (same pattern as depends_on above), so an integration-backed
  # agent that reaches external systems THROUGH a depended-on service (e.g.
  # ctx.services.get('odoo.client')) and has an empty network.outbound builds
  # without a placeholder-residue error. See `reproduceManifestCapabilities`
  # in codegen.ts for the AST-level outbound overwrite.

skip_files:
  - CLAUDE.md
  - template.yaml
  # README.md is a doc-only file with literal {{PLACEHOLDER}} examples in
  # code-block bodies (illustrating the placeholder mechanism). Skipping it
  # avoids the post-codegen no-residue check tripping over those examples.
  - README.md
