schema_version: "1"

identity:
  id: "@omadia/orchestrator"
  name: "Chat Orchestrator"
  version: "0.1.0"
  kind: "extension"
  domain: "core.orchestrator"
  description: "Core chat orchestrator: the Orchestrator class itself (agentic tool-loop against Anthropic Claude), the seven native tools (memory, query_knowledge_graph, chat_participants, ask_user_choice, suggest_follow_ups, find_free_slots, book_meeting), the chat-API HTTP route and the VerifierService wrapper that binds verifier@1 to the live Orchestrator + toSemanticAnswer converter. Erstmaliger Konsument der TurnHookRegistry: ContextRetriever wandert zu onBeforeTurn, FactExtractor zu onAfterTurn (fire-and-forget). Konsumiert die plugin-owned Capabilities `knowledgeGraph` (hard requires; query_knowledge_graph + KG-Lookups), `memoryStore` (memory tool), `embeddingClient` (semantic search), `entityRefBus` (turn-scoped entity tracking), `contextRetriever` + `factExtractor` + `topicDetector` (orchestrator-extras hooks), `verifier` (Bundle: pipeline + store + mode + maxRetries) sowie optional `microsoft365.graph` (find_free_slots + book_meeting via delegated OBO-exchange). Published `chatAgent@1` als Bundle-Capability `{ agent: ChatAgent, raw: Orchestrator }` — Channel-Plugins (Teams, Telegram, HTTP) konsumieren `agent.chat()` / `agent.chatStream()` für ihre Connector-Loops."
  authors:
    - name: "byte5 GmbH"
      email: "info@omadia.ai"
      url: "https://omadia.ai"
  license: "Proprietary"
  categories:
    - "infrastructure"
    - "orchestration"

compat:
  core: ">=1.0 <2.0"
  node: ">=20"

lifecycle:
  entry: "dist/plugin.js"

# Hard requires — activate() can't construct the Orchestrator without
# these (ordering enforces topo-sort: knowledge-graph + memory + extras +
# verifier activate BEFORE this plugin so their published capabilities
# are visible at our late-resolve). embeddingClient + contextRetriever
# + factExtractor + verifier are listed as `requires` for ORDERING, not
# hard-block — their respective plugins activate-without-publish on
# missing config (matching the orchestrator-extras → embeddingClient
# precedent), so our `ctx.services.get(…)` returns undefined gracefully.
# microsoft365.graph stays optional (channels may run without calendar).
requires:
  - "knowledgeGraph@^1"
  - "memoryStore@^1"
  - "entityRefBus@^1"
  - "embeddingClient@^1"
  - "contextRetriever@^1"
  - "factExtractor@^1"
  - "verifier@^1"

# chatAgent@1 — published bundle consumed by channel-plugins (Teams,
# Telegram), the kernel-side HTTP chat route, and the dynamic-agent runtime
# (which late-resolves bundle.raw to wire `attachOrchestrator` per uploaded
# agent). Bundle shape:
#
#   {
#     agent:            ChatAgent             // verifier-wrapped or bare Orchestrator
#     raw:              Orchestrator          // for attachOrchestrator + native-tool registration
#     sessionLogger:    SessionLogger         // shared with graphBackfill + dev-route
#     chatSessionStore: ChatSessionStore      // shared with /api/chat/sessions route
#   }
#
# Without `anthropic_api_key` (or with the catch-all-bootstrap'd empty
# config + missing env), activate() returns a no-op handle and chatAgent@1
# is NOT published — kernel + channel-plugins degrade gracefully (bare
# `serviceRegistry.get` returns undefined, channels skip activation when
# they declare `requires: ["chatAgent@^1"]` per S+10-4b).
provides:
  - "chatAgent@1"

setup:
  fields:
    - key: "anthropic_api_key"
      label: "Anthropic API Key"
      type: "secret"
      required: false
      help: "Anthropic-API-Key für die Haupt-Claude-Loop des Orchestrators. Ohne Key publiziert das Plugin KEIN `chatAgent@1` — Kernel + Channels degradieren auf no-chat. Geteilt mit @omadia/orchestrator-extras + @omadia/verifier (gleicher Anthropic-Account). Bootstrap migriert ANTHROPIC_API_KEY aus dem legacy .env in den Vault. (S+12.6: type: secret — Key wird im Vault gespeichert, nicht in installed.json config.)"
    - key: "orchestrator_model"
      label: "Orchestrator Model"
      type: "enum"
      required: false
      default: "claude-opus-4-8"
      enum:
        - value: "claude-opus-4-8"
          label: "Claude Opus 4.8 (Default — höchste Reasoning-Tiefe)"
        - value: "claude-opus-4-7"
          label: "Claude Opus 4.7 (vorherige Generation)"
        - value: "claude-sonnet-4-6"
          label: "Claude Sonnet 4.6 (schneller, günstiger)"
      help: "Anthropic-Model-ID für die Orchestrator-Haupt-Loop. Als Dropdown gepflegt, damit keine ungültige Model-ID (→ 404 not_found_error) eingetragen werden kann. Migriert aus ORCHESTRATOR_MODEL."
    - key: "orchestrator_max_tokens"
      label: "Max Output Tokens"
      type: "string"
      required: false
      help: "Maximum response-Tokens pro Turn. Default: 4096. Migriert aus ORCHESTRATOR_MAX_TOKENS."
    - key: "max_tool_iterations"
      label: "Max Tool-Loop Iterations"
      type: "string"
      required: false
      help: "Hard cap auf den agentic tool-loop pro Turn. Bei Erschöpfung wird KEIN roher Fehler mehr geworfen — der Orchestrator erzwingt eine letzte tool-freie Iteration und gibt eine Best-Effort-Antwort. Default: 100 (auch Floor — niedrigere installierte Werte werden hochgesetzt). Round-Loops werden separat vom Loop-Guard abgefangen. Migriert aus MAX_TOOL_ITERATIONS."
    - key: "orchestrator_model_routing"
      label: "Per-Turn Model-Routing (Haiku-Triage)"
      type: "boolean"
      required: false
      help: "Wenn an, klassifiziert ein günstiger Haiku-Call jeden Turn: einfach → Simple-Modell, komplex → Complex-Modell. Migriert aus ORCHESTRATOR_MODEL_ROUTING."
    - key: "model_routing_classifier_model"
      label: "Routing: Klassifizierer-Modell"
      type: "string"
      required: false
      help: "Haiku-Modell für die Triage. Leer = Default (haiku-4-5). Migriert aus MODEL_ROUTING_CLASSIFIER_MODEL."
    - key: "model_routing_simple_model"
      label: "Routing: Modell für einfache Turns"
      type: "string"
      required: false
      help: "Leer = Default (sonnet-4-6). Migriert aus MODEL_ROUTING_SIMPLE_MODEL."
    - key: "model_routing_complex_model"
      label: "Routing: Modell für komplexe Turns"
      type: "string"
      required: false
      help: "Leer = Orchestrator-Modell. Migriert aus MODEL_ROUTING_COMPLEX_MODEL."
    - key: "max_turn_seconds"
      label: "Max Turn-Dauer (Sekunden)"
      type: "string"
      required: false
      help: "Optionales Wall-Clock-Budget pro Turn. Wird es überschritten, finalisiert der Orchestrator an der nächsten Iterations-Grenze mit einer Best-Effort-Antwort. 0 oder leer = aus (Default — der Iteration-Cap und der Loop-Guard sind die Schranken; lange Multi-Step-Turns werden nicht abgeschnitten)."
    - key: "loop_repeat_soft"
      label: "Loop-Guard: Soft-Schwelle"
      type: "string"
      required: false
      help: "Wie oft ein identischer Tool-Aufruf (gleiche Argumente UND gleiches Ergebnis) wiederholt werden darf, bevor der Loop-Guard das Modell mit einem Steer-Hinweis zur Kurskorrektur anstößt. Leer/0 = Default (3)."
    - key: "loop_repeat_hard"
      label: "Loop-Guard: Hard-Schwelle"
      type: "string"
      required: false
      help: "Wie oft ein identischer Tool-Aufruf wiederholt werden darf, bevor der Turn zwangsweise mit einer Best-Effort-Antwort finalisiert wird (statt das ganze Iterations-Budget zu verbrennen). Leer/0 = Default (5). Muss > Soft-Schwelle sein."
    - key: "assistant_identity"
      label: "Assistant-Persona"
      type: "string"
      required: false
      help: "Eröffnungszeile(n) des System-Prompts — wer der Assistent ist und in welchem Kontext er arbeitet. Leer lassen für eine generische, integrationsneutrale Persona. Beispiel: 'Du bist der byte5-Assistent für die Odoo-17-Produktion. Du delegierst an spezialisierte Fach-Agenten und merkst dir Lernpunkte.' Die konkrete Fach-Agenten-Liste wird automatisch angehängt — hier nur Identität/Kontext beschreiben, keine Tool-Namen."

playbook:
  when_to_use: |
    Wird automatisch installiert sobald die Empty-Middleware-Roadmap
    Phase S+10 abgeschlossen ist. Operator-Touchpoints:
      - ANTHROPIC_API_KEY setzen (geteilt mit orchestrator-extras + verifier)
      - Optional: ORCHESTRATOR_MODEL überschreiben (default Claude Sonnet 4.5)
      - Optional: ORCHESTRATOR_MAX_TOKENS / MAX_TOOL_ITERATIONS feinjustieren
    Ohne Key läuft der Bot weiter, aber Channel-Plugins die `requires:
    ["chatAgent@^1"]` deklarieren (Teams, Telegram nach S+10-4b) skippen
    ihre Aktivierung — der Operator sieht das in der Plugin-Detail-Page
    als "missing capability".

permissions:
  memory:
    reads:
      - "/memories/*"
    writes:
      - "/memories/*"
  graph:
    reads:
      - "Turn"
      - "Session"
      - "Fact"
      - "EntityRef"
      - "Run"
      - "ToolCall"
    writes:
      - "Turn"
      - "Session"
      - "Run"
      - "ToolCall"
  network:
    outbound:
      - "anthropic-api"
  filesystem:
    scratch: false

integrations:
  - id: "anthropic_api"
    kind: "http"
    target: "Anthropic Claude API (Hauptmodel für die agentic-tool-loop)"
    auth_from: "anthropic_api_key"
    docs: "https://docs.anthropic.com/en/api/messages"
