schema_version: "1"

identity:
  id: "@omadia/agent-seo-analyst"
  domain: "seo"
  name: "SEO Analyst"
  version: "0.1.0"
  description: "Analyses public websites from an SEO perspective: on-page, technical, structured data, crawl audits."
  authors:
    - name: "byte5 GmbH"
      email: "dev@byte5.de"
      url: "https://byte5.de"
  license: "MIT"
  icon: "./assets/icon.svg"
  categories:
    - "analytics"
    - "marketing"
    - "qa"

compat:
  core: ">=1.0 <2.0"
  node: ">=20"

# SEO-Analyst reads/writes agent-scoped memory (see permissions.memory below).
# The `@omadia/memory` extension plugin provides the MemoryStore
# service — listed here so the kernel's dependency gate and the topological
# activation order guarantee the store exists before this agent activates.
depends_on:
  - "@omadia/memory"

lifecycle:
  entry: "dist/plugin.js"
  hooks:
    onInstall: true
    onConfigure: true
    onActivate: true
    onDeactivate: true
    onUninstall: true

  uninstall_policy:
    entities: "delete"
    memory:   "delete"
    secrets:  "delete"

setup:
  fields:
    - key: "target_base_url"
      type: "url"
      label: "Target domain"
      help: "Root URL of the website to analyse, e.g. https://example.com"
      required: true
      default: "https://example.com"
      pattern: "^https?://.+"

    - key: "user_agent"
      type: "string"
      label: "User-Agent"
      help: "Bot identifier sent on each fetch. Checked against robots.txt."
      required: false
      default: "omadia-seo-bot/0.1"

    - key: "crawl_max_pages"
      type: "integer"
      label: "Max. Seiten pro Crawl"
      help: "Obere Schranke fürs audit_site-Tool. Defensive Default."
      required: false
      default: 25

    - key: "crawl_max_depth"
      type: "integer"
      label: "Max. Crawl-Tiefe"
      required: false
      default: 3

    - key: "request_timeout_ms"
      type: "integer"
      label: "Request-Timeout (ms)"
      required: false
      default: 15000

  self_test: true

llm:
  prefers:
    - capabilities: ["tool_use", "long_context"]
      min_context: 200000
      class: "frontier"
      temperature_hint: 0.2
  fallback_allowed: true

capabilities:
  - id: "analyze_page"
    description: "Lädt eine einzelne URL und liefert einen strukturierten On-Page-SEO-Report (Meta, Headings, Links, Bilder, JSON-LD, Score)."
    input_schema:
      type: "object"
      required: ["url"]
      properties:
        url:
          type: "string"
          format: "uri"
          description: "Absolute URL, die analysiert werden soll."
    output_schema:
      type: "object"
      properties:
        url: {type: "string"}
        status: {type: "integer"}
        meta: {type: "object"}
        headings: {type: "object"}
        links: {type: "object"}
        images: {type: "object"}
        structured_data: {type: "array"}
        issues: {type: "array", items: {type: "object"}}
        score: {type: "object"}
    side_effects: "read"
    idempotent: true
    timeout_ms: 20000
    rate_limit:
      per_minute: 30

  - id: "check_technical_seo"
    description: "Prüft robots.txt, sitemap.xml, HTTPS-Config und Security-relevante Header für eine Domain."
    input_schema:
      type: "object"
      properties:
        base_url:
          type: "string"
          format: "uri"
          description: "Optional. Ohne Wert wird target_base_url aus dem Setup verwendet."
    output_schema:
      type: "object"
      properties:
        robots: {type: "object"}
        sitemaps: {type: "array"}
        https: {type: "object"}
        headers: {type: "object"}
        issues: {type: "array", items: {type: "object"}}
        score: {type: "object"}
    side_effects: "read"
    idempotent: true
    timeout_ms: 15000

  - id: "audit_site"
    description: "Crawlt eine Domain (BFS, depth- und count-begrenzt) und aggregiert On-Page-Issues über alle gefundenen Seiten."
    input_schema:
      type: "object"
      properties:
        start_url:
          type: "string"
          format: "uri"
          description: "Optional. Ohne Wert wird target_base_url aus dem Setup verwendet."
        max_pages:
          type: "integer"
          minimum: 1
          maximum: 100
        max_depth:
          type: "integer"
          minimum: 1
          maximum: 5
    output_schema:
      type: "object"
      properties:
        start_url: {type: "string"}
        pages_analyzed: {type: "integer"}
        aggregate_issues: {type: "array"}
        per_page: {type: "array"}
        score: {type: "object"}
    side_effects: "read"
    idempotent: false
    timeout_ms: 60000
    rate_limit:
      per_minute: 5

playbook:
  when_to_use: |
    For SEO questions about the website configured under `target_base_url`:
    "How does the About page hold up SEO-wise?", "Which H1 issues does the
    landing page have?", "Do we have structured data for the Organization
    schema?". The agent only operates on publicly reachable pages — no auth,
    no secrets.

  not_for:
    - "Keyword research via external SEO tools (Ahrefs, SEMrush)"
    - "Lighthouse performance audits (would need a headless browser)"
    - "Non-public / auth-gated pages"
    - "Content changes on the CMS (this agent is read-only)"

  example_prompts:
    - "Analyse https://example.com/about and show me the most important SEO issues."
    - "Check the technical SEO configuration of the configured domain."
    - "Crawl the configured domain at depth 2 and list the top issues across pages."
    - "Do we have JSON-LD on the home page?"

entities:
  produces:
    - "SeoPageReport"
    - "SeoSiteReport"
  consumes:
    - "Url"

permissions:
  memory:
    reads:
      - "session:*"
      - "agent:@omadia/agent-seo-analyst:*"
    writes:
      - "agent:@omadia/agent-seo-analyst:*"

  graph:
    reads: []
    writes: []

  network:
    outbound:
      # The host derived from `target_base_url` at install time is allowed
      # automatically by the runtime — no need to enumerate it here.
      - "*"

  filesystem:
    scratch: false

integrations: []

skills:
  - id: "seo_expert_system"
    kind: "prompt_partial"
    path: "skills/seo-expert.md"
    description: "Rolle, Tonalität und Analyse-Rahmen für den SEO-Analyst."
    shareable: false

  - id: "scoring_rubric"
    kind: "prompt_partial"
    path: "skills/scoring-rubric.md"
    description: "Wie ein SEO-Score aus den Tool-Outputs abgeleitet wird."
    shareable: true

ui:
  commands:
    - id: "analyze_current_page"
      label: "SEO-Analyse dieser Seite"
      capability: "analyze_page"
      trigger: null
    - id: "technical_audit"
      label: "Technischer SEO-Check"
      capability: "check_technical_seo"
      trigger: null
