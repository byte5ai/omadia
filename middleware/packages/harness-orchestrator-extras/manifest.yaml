schema_version: "1"

identity:
  id: "@omadia/orchestrator-extras"
  name: "Orchestrator Extras"
  version: "0.1.0"
  kind: "extension"
  domain: "core.orchestrator-extras"
  description: "Tool-Set: ContextRetriever (pre-turn KG/Embedding-Lookup), FactExtractor (LLM-getriebener KG-Ingest aus Chat-Turns), TopicDetector (per-Message-Embedding-Similarity-Routing) und GraphBackfill-Function (Offline-Graph-Evidence-Catchup; vom Kernel-Boot direkt aus dem Plugin-Barrel aufgerufen — nicht in activate(), da der 88-Turn-Replay routinemäßig das 10s-Activate-Budget sprengt). Konsumiert die Kernel-Capabilities `knowledgeGraph` und `embeddingClient` via `ctx.services.get` und published seinerseits drei Service-Capabilities (`contextRetriever`, `factExtractor`, `topicDetector`) für Orchestrator + Channels."
  authors:
    - name: "byte5 GmbH"
      email: "info@omadia.ai"
      url: "https://omadia.ai"
  license: "Proprietary"
  categories:
    - "infrastructure"
    - "orchestration"

compat:
  core: ">=1.0 <2.0"
  node: ">=20"

lifecycle:
  entry: "dist/plugin.js"

provides:
  - "contextRetriever@1"
  - "factExtractor@1"
  - "topicDetector@1"
  - "captureFilter@1"
  - "sessionBriefing@1"

requires:
  - "knowledgeGraph@^1"
  - "embeddingClient@^1"

# ---------------------------------------------------------------------------
# S+9.2 Sub-Commit 2b: Capability lifetime flipped.
#
# manifest-provides ≠ runtime-provides (S+9.1 Lesson #2): the plugin
# declares all three capabilities here so the capability resolver
# sees them as "available". At runtime activate() decides — depending on
# config — which ones are actually delivered to the ServiceRegistry:
#
#   - `contextRetriever@1`: active as soon as knowledgeGraph + embeddingClient
#     are present (embeddingClient is internally optional — degrades to
#     FTS-only). Is ALWAYS published when the requires are satisfied.
#   - `factExtractor@1` + `topicDetector@1`: only when ANTHROPIC_API_KEY
#     is set (Haiku calls). Without the key activate runs without provide;
#     consumers degrade gracefully (Orchestrator skips fact-ingest;
#     Teams TopicDetector skips → continue-default).
#
# Always-Register-Bootstrap-Pattern (S+9.1 Rule #8): bootstrap.ts
# `bootstrapOrchestratorExtrasFromEnv` ALWAYS registers the plugin —
# even when ANTHROPIC_API_KEY is empty — otherwise the resolver dies
# when a later consumer declares `requires: ["topicDetector@^1"]`.
# ---------------------------------------------------------------------------

setup:
  # Nur operativ relevante Felder im UI. Die internen Tuning-Knöpfe
  # (recall-weights, context-budget, topic-thresholds, model-overrides,
  # backfill-/decay-Parameter) bleiben über ihre code-seitigen Defaults
  # gesteuert (`parseNumberOrDefault(ctx.config.get(...), default)`). Bei
  # Bedarf jederzeit hier wieder als Feld deklarierbar.
  fields:
    - key: "anthropic_api_key"
      label: "Anthropic API Key"
      type: "secret"
      required: false
      help: "Erforderlich für FactExtractor + TopicDetector (Haiku-Klassifikator). Ohne Key konstruiert das Plugin nur den ContextRetriever — Orchestrator-Fact-Ingest und Teams-Topic-Routing degradieren auf no-op. (S+12.6: type: secret — Key wird im Vault gespeichert, nicht in installed.json config.)"
    - key: "capture_level"
      label: "Capture-Level"
      type: "string"
      required: false
      help: "off | minimal | normal | aggressive. Default: minimal (privacy + hints automatisch, kein LLM, kein Drop). normal: + Significance-Scoring, drop bei score < 0.2. aggressive: drop bei score < 0.5. off: Escape-Hatch — KEIN Cleanup, ungestripped text in den Index."
    - key: "capture_default_visibility"
      label: "Capture Default-Visibility"
      type: "string"
      required: false
      help: "private | team | public. Default: team. Wird verwendet, wenn weder palaia-hint noch der Scorer eine Visibility liefert."
    - key: "capture_significance_threshold"
      label: "Significance-Threshold (overrides level-default)"
      type: "string"
      required: false
      help: "Grenze in [0,1]. Default = level-spezifisch (normal=0.2, aggressive=0.5). Nur relevant ab capture_level=normal."

playbook:
  when_to_use: |
    Wird automatisch installiert sobald die Empty-Middleware-Roadmap
    Phase S+9.2 abgeschlossen ist. Operator-Touchpoints: setze
    ANTHROPIC_API_KEY (im Operator-Setup oder via legacy .env) damit
    Fact-Extraction + Topic-Detection aktiv werden. Ohne Key bleibt
    nur der ContextRetriever — KG-RAG funktioniert weiter.

permissions:
  memory:
    reads:
      - "/memories/sessions/*"
    writes: []
  graph:
    reads: []
    writes:
      - "Turn"
      - "Fact"
      - "MENTIONS"
      - "DERIVED_FROM"
  network:
    outbound:
      - "anthropic-api"
  filesystem:
    scratch: false

integrations:
  - id: "anthropic_api"
    kind: "http"
    target: "Anthropic Claude API (Haiku-Klassifikator für FactExtractor + TopicDetector)"
    auth_from: "anthropic_api_key"
    docs: "https://docs.anthropic.com/en/api/messages"
