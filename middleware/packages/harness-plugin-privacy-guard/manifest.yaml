schema_version: "1"

identity:
  id: "@omadia/plugin-privacy-guard"
  name: "Privacy Guard"
  version: "0.1.0"
  kind: "tool"
  domain: "privacy.redact"
  description: "Privacy Shield v4 core plugin. Publishes the `privacy.redact@1` capability — a Data-Plane Boundary that interns raw tool results server-side and hands the LLM only an identity-free Digest. Identity-/order-critical work runs through a server-side Verb API; the final answer is materialized from ground truth. Emits a PII-free PrivacyReceipt the channel renderers (Teams Adaptive-Card, Web inline disclosure) consume to surface what was protected on each turn."
  authors:
    - name: "byte5 GmbH"
      email: "info@omadia.ai"
      url: "https://omadia.ai"
  license: "MIT"
  categories:
    - "privacy"
    - "compliance"
    - "guardrails"

compat:
  core: ">=1.0 <2.0"
  node: ">=20"

lifecycle:
  entry: "dist/plugin.js"

# ---------------------------------------------------------------------------
# No setup fields. The v4 Data-Plane Boundary is generic over JSON shape and
# value statistics — there is no per-tenant policy, allowlist, or detector
# configuration to tune.
# ---------------------------------------------------------------------------
setup:
  fields: []

playbook:
  when_to_use: |
    Aktiviere dieses Plugin, damit rohe Tool-Ergebnisse niemals im Klartext
    an Public-LLMs (Anthropic, OpenAI) gelangen. Das Plugin published die
    `privacy.redact@1`-Capability; der Orchestrator-Hook ruft sie am
    Tool-Dispatch-Seam auf:
      - `internToolResultV4` interniert das rohe Tool-Ergebnis server-seitig
        hinter einer `datasetId` und gibt dem LLM nur einen identitätsfreien
        Digest.
      - `runV4Tool` führt vom LLM komponierte `v4_*`-Verben (sort, filter,
        rank, …) und das `v4_render_answer`-Directive in vertrauenswürdigem
        Server-Code aus.
      - `finalizeTurn` verwirft die Turn-Datasets und liefert eine PII-freie
        `PrivacyReceipt` für die UI-Disclosure.
    Die Receipt landet als Message-Metadata im Channel-Output (Teams + Web)
    und kann dort als Collapsed-/Expanded-Card gerendert werden.

# ---------------------------------------------------------------------------
# Permissions. Pure server-side compute — no network, no graph, no memory.
# ---------------------------------------------------------------------------
permissions:
  memory:
    reads: []
    writes: []
  graph:
    reads: []
    writes: []
  network:
    outbound: []
  filesystem:
    scratch: false

provides:
  - "privacy.redact@1"
requires: []
