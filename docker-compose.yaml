# Omadia local development + self-hosting stack — MINIMAL CORE.
#
# `docker compose up -d` brings up only the three services every install
# needs, pulling prebuilt images from GHCR (no source build):
#   - middleware  (Omadia kernel API on http://localhost:8080)
#   - web-ui      (Admin UI on http://localhost:3333)
#   - postgres    (Postgres + pgvector — KG / routines / verifier store)
#
# Optional features are opt-in overlay files, composed with `-f` (each adds
# its sidecar service AND the env that activates the matching plugin):
#   -f docker-compose.storage.yaml     object storage (MinIO) — chat attachments
#   -f docker-compose.diagrams.yaml    Kroki diagram rendering (needs storage too)
#   -f docker-compose.embeddings.yaml  in-tenant embeddings (Ollama)
#   -f docker-compose.skillspector.yaml  advisory plugin code scanning (SkillSpector)
#   -f docker-compose.build.yaml       build middleware + web-ui from source
#
# Example — full stack:
#   docker compose -f docker-compose.yaml \
#     -f docker-compose.storage.yaml -f docker-compose.diagrams.yaml \
#     -f docker-compose.embeddings.yaml up -d
#
# Image tag: defaults to `latest` (newest release). Pin a specific version
# with `OMADIA_VERSION=vX.Y.Z` as a shell env var, or in a project-root `.env`
# file next to this compose file. Compose reads image-tag variables only from
# the shell or the root `.env`, never from middleware/.env.
#
# Usage:
#   cp middleware/.env.example middleware/.env   # set ANTHROPIC_API_KEY
#   docker compose up -d                         # start the minimal core (pulls)
#   docker compose logs -f middleware            # tail middleware boot
#   docker compose down                          # stop (keeps volumes)
#   docker compose down -v                       # stop + wipe all data
#
# All host ports bind to 127.0.0.1 only — never expose this stack on a
# public interface without an external reverse-proxy + auth layer.

services:
  # --- Omadia middleware (TypeScript kernel + plugin runtime) ---------------
  middleware:
    image: ghcr.io/byte5ai/omadia-middleware:${OMADIA_VERSION:-latest}
    restart: unless-stopped
    env_file:
      # Optional: operator copies .env.example → .env and fills in
      # ANTHROPIC_API_KEY (+ any plugin-specific creds). Compose tolerates a
      # missing file when `required: false`, so a fresh clone still validates.
      # The kernel boots without ANTHROPIC_API_KEY — the admin UI + setup
      # wizard come up and the chat route returns 503 until a key is saved
      # (via the wizard or this file).
      - path: middleware/.env
        required: false
    environment:
      # Postgres + pgvector for the knowledge graph, routines store, and
      # verifier store. Without DATABASE_URL the middleware falls back to
      # the in-memory KG (loses state on restart, no routines, no verifier
      # persistence) — fine for tests but not what an operator who just ran
      # `docker compose up` wants.
      DATABASE_URL: postgresql://omadia:omadia@postgres:5432/omadia
      # Vault master key. The shipped image bakes `NODE_ENV=production`
      # (see Dockerfile), which would normally make the middleware refuse
      # to boot without VAULT_KEY set — by design, because the dev
      # fallback writes the master key into the data volume (encrypted
      # vault → plaintext-at-rest equivalence). For the local compose
      # stack we override to `development` so the dev fallback stays
      # available: on first boot the middleware writes a random key into
      # /data/.dev-vault.key on the persistent volume, and it's re-read
      # across `docker compose restart` and rebuilds.
      #
      # For any deployment beyond local dev: drop the NODE_ENV override
      # below AND supply your own key via `.env` (`VAULT_KEY=$(openssl
      # rand -base64 32)`). Keep that key stable — losing it makes vault
      # entries unrecoverable.
      VAULT_KEY: ${VAULT_KEY:-}
      NODE_ENV: ${NODE_ENV:-development}
      # NB: `DEV_ENDPOINTS_ENABLED` (the unauthenticated /api/dev/graph +
      # /api/dev/memory mount) is intentionally NOT hard-coded here. The
      # admin UI's Graph + Memory viewers depend on it, but it exposes raw
      # KG + memory state without auth — anyone who reuses this compose file
      # as a template for a non-local deploy (and accidentally removes the
      # 127.0.0.1 port-binding above) would otherwise expose internal state.
      # To enable for local inspection, uncomment `DEV_ENDPOINTS_ENABLED=true`
      # in `middleware/.env` (already picked up via `env_file` above).
      # **NEVER set this on a public deployment.**
      # Redirect kernel persistent state (vault, installed.json, builder
      # drafts.db, uploaded plugin packages) to the volume mount below.
      # Without this, the kernel writes under /app/data which lives in the
      # image layer and gets wiped on every image pull/rebuild — all builder
      # drafts disappear, uploaded plugins vanish, etc. Path must match the
      # volume target. (Memory itself is Postgres- or RAM-backed.)
      PLATFORM_DATA_DIR: /data
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '127.0.0.1:8080:8080'
    volumes:
      # Vault (encrypted secrets), memory store, builder drafts.db, uploaded
      # plugin packages — everything the kernel needs to keep across restarts.
      - middleware-data:/data
    networks: [omadia]
    healthcheck:
      # node-based probe — debian-slim has neither wget nor curl pre-installed,
      # and node is the one binary we're guaranteed to have.
      test:
        - 'CMD'
        - 'node'
        - '-e'
        - "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      # First-boot includes plugin-catalog load + KG migrations + bootstrap
      # auto-installs + workspace-package activations — easily 30-60s on a
      # cold machine. Don't fail the healthcheck during that window.
      start_period: 90s

  # --- Admin UI (Next.js, talks to middleware over /bot-api) ----------------
  web-ui:
    image: ghcr.io/byte5ai/omadia-web-ui:${OMADIA_VERSION:-latest}
    restart: unless-stopped
    environment:
      MIDDLEWARE_URL: http://middleware:8080
    depends_on:
      middleware:
        condition: service_healthy
    ports:
      - '127.0.0.1:3333:3000'
    networks: [omadia]

  # --- Postgres + pgvector (knowledge graph, routines, verifier store) -----
  # Same image as Neon-style production deployments — pgvector pre-installed.
  # Migrations run automatically on the middleware's first boot.
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    # Network alias + hostname so the middleware always resolves the
    # `postgres` DNS name regardless of the compose project prefix. No explicit
    # container_name: it's redundant for in-network DNS (the service name +
    # `networks.omadia.aliases` below already resolve `postgres`) and a fixed
    # name collides when a second compose project runs side by side.
    hostname: postgres
    environment:
      POSTGRES_USER: omadia
      POSTGRES_PASSWORD: omadia
      POSTGRES_DB: omadia
    ports:
      # Loopback-only. Operator can connect via psql from the host for
      # inspection; never expose Postgres publicly.
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      omadia:
        aliases: [postgres]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U omadia -d omadia']
      interval: 5s
      timeout: 3s
      retries: 10
      # First-boot initdb runs while pg_isready already says "ready" — give
      # it a head start so the middleware doesn't race against role + DB
      # creation finishing.
      start_period: 15s

volumes:
  middleware-data:
  postgres-data:

networks:
  omadia:
    driver: bridge
