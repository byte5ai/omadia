# Overlay: build middleware + web-ui from source instead of pulling images.
#
# For contributors / anyone hacking on the kernel or admin UI. Compose still
# tags the result under the GHCR image name from docker-compose.yaml, but
# `--build` compiles it locally from this checkout:
#   docker compose -f docker-compose.yaml -f docker-compose.build.yaml up -d --build
#
# Combine with feature overlays as usual, e.g. add -f docker-compose.storage.yaml.

services:
  middleware:
    build:
      context: .
      dockerfile: Dockerfile

  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
      # No MIDDLEWARE_URL build-arg: the /bot-api and /p proxies read it at
      # request time (web-ui/app/_lib/middlewareProxy.ts), and the runtime
      # value comes from the web-ui service env in docker-compose.yaml.
